services:
  - type: web
    name: anish-game-portfolio
    runtime: node
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: npm ci --no-audit --no-fund && npm run build
    startCommand: npm run start -- --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
